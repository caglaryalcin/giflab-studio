apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: giflab-pvc
  namespace: default
  labels:
    app.kubernetes.io/name: giflab
spec:
  storageClassName: cephfs-sc
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: giflab
  namespace: default
  labels:
    app.kubernetes.io/name: giflab
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: giflab
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: giflab
    spec:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: prepare-storage
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /data/gif-archive /data/cache /data/collections && chown -R 1001:1001 /data
          volumeMounts:
            - name: giflab-storage
              mountPath: /data
      containers:
        - name: giflab
          image: ghcr.io/caglaryalcin/giflab-studio:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Istanbul
            - name: HOSTNAME
              value: 0.0.0.0
            - name: PORT
              value: "3000"
            - name: GIF_ARCHIVE_DIR
              value: /app/public/gif-archive
            - name: GIF_CACHE_DIR
              value: /app/data/cache
            - name: GIF_COLLECTIONS_FILE
              value: /app/data/collections/collections.json
          volumeMounts:
            - name: giflab-storage
              mountPath: /app/public/gif-archive
              subPath: gif-archive
            - name: giflab-storage
              mountPath: /app/data/cache
              subPath: cache
            - name: giflab-storage
              mountPath: /app/data/collections
              subPath: collections
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            failureThreshold: 30
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: giflab-storage
          persistentVolumeClaim:
            claimName: giflab-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: giflab
  namespace: default
  labels:
    app.kubernetes.io/name: giflab
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: giflab
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: http
      nodePort: 31670
